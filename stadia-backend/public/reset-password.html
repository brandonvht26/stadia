<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadia - Nueva contraseña</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; background: #fff; color: #000;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { max-width: 380px; width: 100%; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p { color: #444; font-size: 14px; }
  input { width: 100%; padding: 12px; margin-top: 12px; border: 1px solid #000;
          font-size: 15px; box-sizing: border-box; }
  button { width: 100%; padding: 14px; margin-top: 16px; background: #000; color: #fff;
           border: none; font-size: 15px; cursor: pointer; }
  button:disabled { background: #999; }
  #msg { margin-top: 14px; font-size: 14px; }
  .error { color: #c00; }
  .success { color: #060; }
  #openApp { display:none; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <h1>Stadia</h1>
  <p id="subtitle">Ingresa tu nueva contraseña.</p>
  <div id="confirmStep">
    <button id="confirmBtn">Sí, deseas cambiar tu contraseña</button>
  </div>
  <form id="form" style="display:none;">
    <input type="password" id="password" placeholder="Nueva contraseña" minlength="6" required>
    <input type="password" id="confirm" placeholder="Confirmar contraseña" minlength="6" required>
    <button type="submit" id="btn">Cambiar contraseña</button>
  </form>
  <div id="msg"></div>
  <a id="openApp" href="stadia://login"><button style="margin-top:10px;">Abrir Stadia</button></a>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient(
    'https://hbsraxrbdfddakfgfvjc.supabase.co',
    'sb_publishable_bnET93B_eqY-mRbLHVAbEA_rCh0s50z'
  );

  const msg = document.getElementById('msg');
  const form = document.getElementById('form');
  const btn = document.getElementById('btn');
  const subtitle = document.getElementById('subtitle');
  const confirmStep = document.getElementById('confirmStep');
  const confirmBtn = document.getElementById('confirmBtn');

  const params = new URLSearchParams(window.location.search);
  const token_hash = params.get('token_hash');
  const type = params.get('type') || 'recovery';

  let sessionReady = false;

  if (!token_hash) {
    subtitle.textContent = 'Link inválido o incompleto.';
    confirmStep.style.display = 'none';
  }

  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Verificando...';
    const { error } = await supabase.auth.verifyOtp({ token_hash, type });
    if (error) {
      subtitle.textContent = 'Este link ya expiró o ya fue usado. Solicita uno nuevo desde la app.';
      confirmStep.style.display = 'none';
      return;
    }
    sessionReady = true;
    confirmStep.style.display = 'none';
    form.style.display = 'block';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!sessionReady) return;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    if (password !== confirm) {
      msg.innerHTML = '<span class="error">Las contraseñas no coinciden.</span>';
      return;
    }
    if (password.length < 6) {
      msg.innerHTML = '<span class="error">Mínimo 6 caracteres.</span>';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    const { error } = await supabase.auth.updateUser({ password });
    if (error) {
      msg.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña';
      return;
    }
    form.style.display = 'none';
    msg.innerHTML = '<span class="success">Contraseña actualizada correctamente.</span>';
    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
    if (isMobile) document.getElementById('openApp').style.display = 'block';
  });
</script>
</body>
</html>
