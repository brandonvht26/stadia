<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadia - Nueva contraseña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #6D1432;
    --bg: #F6F4F0;
    --surface: #FFFFFF;
    --text-primary: #2A2A2A;
    --text-secondary: #6B6B6B;
    --border: rgba(0,0,0,0.08);
    --error: #C0392B;
    --success: #2E7D32;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Raleway', -apple-system, Arial, sans-serif;
    background: var(--bg); color: var(--text-primary);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; padding: 16px;
  }
  .card {
    max-width: 380px; width: 100%; padding: 32px 28px;
    background: var(--surface); border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 24px; font-weight: 700; margin: 0 0 8px;
    color: var(--primary);
  }
  p { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin: 0 0 4px; }
  input {
    width: 100%; padding: 13px 14px; margin-top: 12px;
    border: 1px solid var(--border); border-radius: 12px;
    font-family: 'Raleway', sans-serif; font-size: 15px;
    background: var(--bg); color: var(--text-primary);
  }
  input:focus { outline: none; border-color: var(--primary); }
  button {
    width: 100%; padding: 14px; margin-top: 18px;
    background: var(--primary); color: #fff; border: none;
    border-radius: 12px; font-family: 'Raleway', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { background: #C9C9C9; cursor: default; }
  #msg { margin-top: 14px; font-size: 14px; font-weight: 600; }
  .error { color: var(--error); }
  .success { color: var(--success); }
  #openApp { display:none; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <h1>Stadia</h1>
  <p id="subtitle">Ingresa tu nueva contraseña.</p>
  <div id="confirmStep">
    <button id="confirmBtn">Sí, deseas cambiar tu contraseña</button>
  </div>
  <form id="form" style="display:none;">
    <input type="password" id="password" placeholder="Nueva contraseña" minlength="6" required>
    <input type="password" id="confirm" placeholder="Confirmar contraseña" minlength="6" required>
    <button type="submit" id="btn">Cambiar contraseña</button>
  </form>
  <div id="msg"></div>
  <a id="openApp" href="stadia://login"><button style="margin-top:10px;">Abrir Stadia</button></a>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient(
    'https://hbsraxrbdfddakfgfvjc.supabase.co',
    'sb_publishable_bnET93B_eqY-mRbLHVAbEA_rCh0s50z'
  );

  const msg = document.getElementById('msg');
  const form = document.getElementById('form');
  const btn = document.getElementById('btn');
  const subtitle = document.getElementById('subtitle');
  const confirmStep = document.getElementById('confirmStep');
  const confirmBtn = document.getElementById('confirmBtn');

  const params = new URLSearchParams(window.location.search);
  const token_hash = params.get('token_hash');
  const type = params.get('type') || 'recovery';

  let sessionReady = false;

  if (!token_hash) {
    subtitle.textContent = 'Link inválido o incompleto.';
    confirmStep.style.display = 'none';
  }

  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Verificando...';
    const { error } = await supabase.auth.verifyOtp({ token_hash, type });
    if (error) {
      subtitle.textContent = 'Este link ya expiró o ya fue usado. Solicita uno nuevo desde la app.';
      confirmStep.style.display = 'none';
      return;
    }
    sessionReady = true;
    confirmStep.style.display = 'none';
    form.style.display = 'block';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!sessionReady) return;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    if (password !== confirm) {
      msg.innerHTML = '<span class="error">Las contraseñas no coinciden.</span>';
      return;
    }
    if (password.length < 6) {
      msg.innerHTML = '<span class="error">Mínimo 6 caracteres.</span>';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    const { error } = await supabase.auth.updateUser({ password });
    if (error) {
      msg.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña';
      return;
    }
    form.style.display = 'none';
    msg.innerHTML = '<span class="success">Contraseña actualizada correctamente.</span>';
    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
    if (isMobile) document.getElementById('openApp').style.display = 'block';
  });
</script>
</body>
</html>
