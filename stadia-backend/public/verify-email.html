<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadia - Confirmar cuenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #6D1432;
    --bg: #F6F4F0;
    --surface: #FFFFFF;
    --text-primary: #2A2A2A;
    --text-secondary: #6B6B6B;
    --error: #C0392B;
    --success: #2E7D32;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Raleway', -apple-system, Arial, sans-serif;
    background: var(--bg); color: var(--text-primary);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; padding: 16px;
  }
  .card {
    max-width: 380px; width: 100%; padding: 32px 28px; text-align: center;
    background: var(--surface); border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 24px; font-weight: 700; margin: 0 0 8px;
    color: var(--primary);
  }
  p { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin: 0; }
  button {
    width: 100%; padding: 14px; margin-top: 18px;
    background: var(--primary); color: #fff; border: none;
    border-radius: 12px; font-family: 'Raleway', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { background: #C9C9C9; cursor: default; }
  #msg { margin-top: 14px; font-size: 14px; font-weight: 600; }
  .error { color: var(--error); }
  .success { color: var(--success); }
  #openApp { display:none; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <h1>Stadia</h1>
  <p id="subtitle">¿Deseas confirmar tu cuenta?</p>
  <button id="confirmBtn">Sí, confirmar mi cuenta</button>
  <div id="msg"></div>
  <a id="openApp" href="stadia://login"><button style="margin-top:10px;">Abrir Stadia</button></a>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient(
    'https://hbsraxrbdfddakfgfvjc.supabase.co',
    'sb_publishable_bnET93B_eqY-mRbLHVAbEA_rCh0s50z'
  );

  const msg = document.getElementById('msg');
  const subtitle = document.getElementById('subtitle');
  const confirmBtn = document.getElementById('confirmBtn');

  const params = new URLSearchParams(window.location.search);
  const token_hash = params.get('token_hash');
  const type = params.get('type') || 'signup';

  if (!token_hash) {
    subtitle.textContent = 'Link inválido o incompleto.';
    confirmBtn.style.display = 'none';
  }

  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Confirmando...';
    const { error } = await supabase.auth.verifyOtp({ token_hash, type });
    if (error) {
      subtitle.textContent = 'Este link ya expiró o ya fue usado.';
      confirmBtn.style.display = 'none';
      msg.innerHTML = '<span class="error">Solicita un nuevo correo desde la app.</span>';
      return;
    }
    confirmBtn.style.display = 'none';
    subtitle.textContent = 'Cuenta confirmada correctamente.';
    msg.innerHTML = '<span class="success">Ya puedes iniciar sesión.</span>';
    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
    if (isMobile) document.getElementById('openApp').style.display = 'block';
  });
</script>
</body>
</html>
